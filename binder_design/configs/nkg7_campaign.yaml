campaign: NKG7_ECL_binders
description: De novo mini-binders vs NKG7 extracellular loops ECL1/ECL2. Config-driven;
  reusable for any target.
binder:
  length_range: 50-65
  type: de_novo_minibinder
defaults:
  rfdiffusion:
    num_designs_smoketest: 50
    num_designs_production: 500
    model: Complex_base_ckpt.pt
    diffuser_T: 50
    denoiser_noise_scale: 0
    n_shards_production: 4
    n_shards_smoketest: 1
    array_throttle: 2
    note: Production splits num_designs across n_shards SLURM array tasks (each
      does num_designs/n_shards backbones with a distinct seed and output prefix),
      throttled to array_throttle concurrent GPUs to stay queue-friendly on the
      shared cluster. 500 backbones/arm at T=50 was chosen for the first pass to
      keep GPU-hour (fair-share) cost modest (~73 GPU-h across 6 arms).
  proteinmpnn:
    num_seq_per_target_smoketest: 8
    num_seq_per_target_production: 16
    sampling_temp: '0.1'
    model_name: v_48_020
    use_soluble_model: true
  filters:
    iptm_min: 0.5
    complex_plddt_min: 0.7
    binder_ptm_min: 0.5
    binder_rmsd_max: 2.0
    chai_iptm_min: 0.5
    cross_iptm_min: 0.5
    note: Boltz-2 confidence fields are 0-1 scaled. iptm>0.5 community interface pass
      line; complex_plddt>0.7 fold pass. chai_iptm_min gates the orthogonal-consensus
      pass; cross_iptm_min gates cross-species reactivity.
  consensus:
    enabled: true
    tool: chai1
    diffn_timesteps_smoketest: 80
    diffn_timesteps_production: 200
    recycling_steps: 3
    note: Chai-1 orthogonal cofolder (ESM embeddings, no MSA). A design is a
      consensus hit if it passes Boltz-2 AND Chai ipTM >= chai_iptm_min. Mirrors
      the Boltz complex cap so both validators cover the same design set.
  crossspecies:
    enabled: true
    topn_smoketest: 8
    topn_production: 25
    diffusion_samples: 1
    recycling_steps: 3
    species_map:
      human: mouse
      mouse: human
    note: Re-fold each arm's top-N binders against the OTHER species' target with
      Boltz-2. A design is cross-reactive if native ipTM AND cross ipTM both >=
      cross_iptm_min. species_map names the cross target per arm species.
  validator:
    tool: boltz2
    recycling_steps: 3
    diffusion_samples_smoketest: 1
    msa_mode: single_sequence
    no_kernels: true
    note: ColabFold/Boltz-1 EasyBuild modules SIGILL on mlgpu (AVX-512 vs AMD AVX2
      nodes); pip Boltz-2 is AVX2-safe. diffusion_samples_production lowered to 1
      for the first pass (5x cheaper); refine winners at ds=5 later.
    diffusion_samples_production: 1
    top_seqs_per_backbone_production: 2
    top_seqs_per_backbone_smoketest: 0
    max_complexes_smoketest: 8
    chai_max_complexes_production: 50
    max_complexes_production: 0
target:
  name: NKG7
  human:
    acc: Q16617
    pdb: targets/NKG7_human_Q16617_AF.pdb
    length: 165
  mouse:
    acc: Q99PA5
    pdb: targets/NKG7_mouse_Q99PA5_AF.pdb
    length: 165
